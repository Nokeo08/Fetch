services:
  fetch:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fetch
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    environment:
      - APP_PASSWORD=${APP_PASSWORD}
      - DISABLE_AUTH=${DISABLE_AUTH:-false}
      - API_TOKEN=${API_TOKEN:-}
      - PORT=${PORT:-3000}
      - DATABASE_PATH=/data/fetch.db
      - SESSION_SECRET=${SESSION_SECRET:-}
      - NODE_ENV=production
    volumes:
      - fetch-data:/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${PORT:-3000}/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

volumes:
  fetch-data:
    driver: local
