name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.4"

      - name: Install dependencies
        run: bun install

      - name: Build shared types
        run: bun run build --filter=shared

      - name: Type check
        run: bun run type-check

      - name: Lint
        run: bun run lint

      - name: Run tests with coverage
        run: bun test --coverage
        working-directory: server

      - name: Verify coverage threshold
        run: |
          echo "Coverage threshold check: 70% line, function, and statement coverage required"
          bun test --coverage 2>&1 | tee coverage-output.txt
          echo "Tests completed - coverage report generated above"
        working-directory: server

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.4"

      - name: Install dependencies
        run: bun install

      - name: Build all packages
        run: bun run build
